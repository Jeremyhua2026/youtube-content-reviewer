services:
  - type: web
    name: youtube-content-reviewer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false   # set this manually in the Render dashboard, do NOT commit
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health
